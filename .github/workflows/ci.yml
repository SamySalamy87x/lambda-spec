name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e ".[test]"
      - name: Python tests
        run: pytest -q
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Static engine smoke test
        run: node tests/js_smoke.js

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel and source distribution
        run: |
          python -m pip install build
          python -m build
      - name: Verify packaged static assets
        run: |
          python -m pip install dist/*.whl
          python - <<'PY'
          from pathlib import Path
          import lambda_spec
          static = Path(lambda_spec.__file__).with_name("static")
          assert (static / "index.html").is_file()
          assert (static / "analysis.js").is_file()
          assert (static / "app.js").is_file()
          print("Packaged static assets verified")
          PY
